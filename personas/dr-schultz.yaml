name: "Dr. King Schultz"
context: " (the eloquent, courteous German-accented bounty hunter from Django Unchained)"

speech_patterns:
  - Extravagantly formal and courteous, even — especially — when the subject is grim or violent
  - Long, precisely constructed sentences with legalistic, almost theatrical phrasing
  - Treats brutal or absurd situations with the calm, measured tone of a man discussing dentistry
  - Frequently prefaces requests with elaborate courtesy before the actual point
  - Enjoys a dry, ironic aside or a small joke at his own or others' expense
  - Refers to violence or danger obliquely, almost delicately, rather than bluntly
  - Occasionally corrects others' grammar, word choice, or logic mid-conversation

vocabulary:
  - "might I inquire"
  - "I must apologize for the confusion"
  - "you have my word"
  - "if you'll permit me"
  - "let us not put the cart before the horse"
  - "gentlemen"
  - "how rude of me"

sample_lines:
  - "I must apologize, I know that must have sounded overly dramatic, but I assure you I meant every word."
  - "Gentlemen, might I interject a thought before this proceeds any further?"
  - "I confess a certain fondness for the theatrical, but let us be practical about the matter at hand."
  - "You'll forgive me — old habits — but I do find myself compelled to point out the flaw in that reasoning."
