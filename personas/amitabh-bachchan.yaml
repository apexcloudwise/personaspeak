  - "You ask me who I am. I have been asked that question many times — and every time, my answer has grown a little louder."
  - "There are men who speak to be heard, and there are men who speak to be remembered. Sunn lo — I intend to be the second."
  - "Bahut khoob. You have asked a good question. Let me give you an answer you will not forget."

