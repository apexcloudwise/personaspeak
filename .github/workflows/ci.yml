name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  personas-and-cli:
    name: Validate personas & smoke-test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r desktop/requirements.txt
      - name: Validate persona schema
        run: python desktop/validate_personas.py
      - name: CLI smoke test
        run: python desktop/personaspeak.py --list
      - name: Persona validation unit tests
        run: python -m unittest desktop/test_validate_personas.py

  patchnote-gate:
    name: PATCHNOTES.md touched
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      # Escape hatch: a PR carrying the `no-patchnote` label skips the check.
      # The skip is announced loudly — house rule is "loud skips, never silent ones."
      - name: Announce escape-hatch skip
        if: contains(github.event.pull_request.labels.*.name, 'no-patchnote')
        run: |
          echo "::notice::Patch-note gate intentionally skipped — this PR carries the 'no-patchnote' label. A loud skip, not a silent one."
      - name: Checkout (full history so we can diff against the base)
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-patchnote') }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require PATCHNOTES.md in the diff
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-patchnote') }}
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          # Capture the diff so a Git failure remains fatal, then match without
          # a pipeline: an early-exiting reader can trigger SIGPIPE under
          # `pipefail` on a large path list even when PATCHNOTES.md is present.
          changed="$(git diff --name-only "${base}...HEAD")"
          if [[ $'\n'"$changed"$'\n' == *$'\nPATCHNOTES.md\n'* ]]; then
            echo "::notice::PATCHNOTES.md is in the diff — gate satisfied."
          else
            echo "::error::This PR doesn't touch PATCHNOTES.md. Every merged PR adds a one-line entry at the top of PATCHNOTES.md, in the VOICE.md register — true thing first, joke second. If this PR genuinely ships without one (pure revert, meta-fix on the gate itself, etc.), apply the 'no-patchnote' label and push again. The skip is loud, never silent."
            exit 1
          fi

  android-build:
    name: Build Android modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Install scan tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
          command -v rg
          rg --version
      - name: Build and test the current Android graph
        working-directory: android
        run: >-
          ./gradlew
          :core-personas:build
          :core-providers:build
          :personaspeak-ui:testDebugUnitTest
          :personaspeak-ui:assembleDebug
          :keyboard-stub:assembleDebug
          :app:assembleDebug
          :app:testDebugUnitTest
          --no-daemon
      - name: Require the three current-graph artifacts
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t artifacts < <(find . \( -path '*/build/outputs/apk/*/*.apk' -o -path '*/build/outputs/aar/*.aar' \) -type f -print | sort)
          printf '%s\n' "${artifacts[@]}"
          test "${#artifacts[@]}" -eq 3
          test "${artifacts[0]}" = "./app/build/outputs/apk/debug/app-debug.apk"
          test "${artifacts[1]}" = "./keyboard-stub/build/outputs/aar/keyboard-stub-debug.aar"
          test "${artifacts[2]}" = "./personaspeak-ui/build/outputs/aar/personaspeak-ui-debug.aar"
      - name: Forbid Android imports in core modules
        shell: bash
        run: |
          set -euo pipefail
          ! rg -n '^import android\.' android/core-personas/src android/core-providers/src
      - name: Forbid AnySoftKeyboard imports in personaspeak-ui
        shell: bash
        run: |
          set -euo pipefail
          ! rg -n 'com\.anysoftkeyboard|com\.menny' android/personaspeak-ui/src
      - name: Forbid rejected topology outside the quarantined modules
        shell: bash
        run: |
          set -euo pipefail
          ! rg -n \
            'switchBackToPreviousKeyboard|PersonaPanel|fun[[:space:]]+Onboarding[[:space:]]*\(' \
            android \
            --glob '!android/app/**' \
            --glob '!android/keyboard-stub/**' \
            --glob '!android/keyboard/**' \
            --glob '*.{kt,java}'
